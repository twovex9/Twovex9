<!doctype html>
<html lang="nl">
<head>
  <script>/*besa-auth-preguard*/(function(){try{var p=location.pathname,seg=(p.split('/').filter(Boolean).pop()||'');if(seg==='login'||seg==='login.html')return;if(!localStorage.getItem('sb-besa-auth')){location.replace('login?next='+encodeURIComponent(p+location.search+location.hash));}}catch(e){}})();</script>
  <script>(function(){try{var t=localStorage.getItem('besa-theme');document.documentElement.setAttribute('data-theme',t==='dark'?'dark':'light');}catch(e){document.documentElement.setAttribute('data-theme','light');}})();</script>
  <script src="theme.js?v=th1" defer></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://boscwvojcggkbdxhlfys.supabase.co">
  <title>Mijn uitnodigingen — Future Flow</title>
  <link rel="stylesheet" href="styles.css?v=compact1" />
  <link rel="icon" type="image/png" href="assets/app-icon-192.png">
  <link rel="apple-touch-icon" href="assets/app-icon-192.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-title" content="Future Flow">
  <style>
    .content--mu{max-width:1000px;}
    .mu-time{color:var(--text-muted);font-variant-numeric:tabular-nums;margin-left:4px;}
    .mu-note{font-size:12px;color:var(--text-muted);margin-top:2px;}
    .mu-actions{white-space:nowrap;text-align:right;}
    .mu-btn{font-size:12px;font-weight:650;padding:5px 12px;border-radius:8px;cursor:pointer;margin-left:6px;}
    button.mu-btn.btn-outline{background:transparent;}
    .mu-actions button[disabled]{opacity:.55;cursor:default;}
  </style>
</head>
<body>
  <div class="app-shell app-shell--noaside">
    <header class="topbar">
      <div class="topbar-left">
        <a href="home" class="brand-logo" aria-label="Home">
          <img class="brand-logo-img" src="assets/etf-logo.png" width="140" height="48" alt="Embrace the Future" />
        </a>
        <div class="top-nav-track">
          <nav class="top-nav" aria-label="Hoofdnavigatie">
            <a href="home" class="top-link">Home</a>
            <a href="mijn-proforma-facturen" class="top-link">Mijn facturen</a>
            <a href="mijn-uitnodigingen" class="top-link is-active">Mijn uitnodigingen</a>
            <a href="mijn-gegevens" class="top-link">Mijn gegevens</a>
          </nav>
        </div>
      </div>
      <div class="topbar-icons">
        <button type="button" class="icon-btn" aria-label="Thema wisselen" onclick="var d=document.documentElement,n=d.getAttribute('data-theme')==='dark'?'light':'dark';d.setAttribute('data-theme',n);try{localStorage.setItem('besa-theme',n)}catch(e){}">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </header>

    <main class="content content--mu">
      <div class="content-header">
        <div>
          <h1>Mijn uitnodigingen</h1>
          <p class="content-subtitle">De planner heeft je uitgenodigd voor onderstaande diensten. Accepteer wat je wilt draaien — pas dan sta je ingepland. Weigeren mag ook.</p>
        </div>
      </div>

      <section class="table-card table-card--compact">
        <div class="table-wrapper">
          <table class="employees-table" id="mu-table">
            <thead>
              <tr>
                <th>Wanneer</th>
                <th>Dienst</th>
                <th>Locatie</th>
                <th class="mu-actions">Actie</th>
              </tr>
            </thead>
            <tbody id="mu-tbody">
              <tr><td colspan="4" class="table-empty">Uitnodigingen laden…</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="error-reporter.js?v=er1"></script>
  <script src="besa-sync-reporter.js"></script>
  <script src="permissions.js?v=perm2" defer></script>
  <script src="permissions-page-map.js?v=permmap1" defer></script>
  <script src="permissions-gate.js?v=permgate1" defer></script>
  <script src="auth-guard.js"></script>
  <script src="notification-bell.js?v=nb1" defer></script>
  <script src="profiles-data.js"></script>
  <script src="dienst-uitnodigingen-data.js"></script>
  <script src="mijn-uitnodigingen.js?v=mu1" defer></script>
